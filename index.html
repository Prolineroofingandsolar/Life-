<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#1a1b25" />
    <!-- iOS home-screen / PWA hints -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Life" />
    <meta name="description" content="A calm productivity app for ADHD brains — tasks, body care, focus and money in one place." />
    <title>Life</title>
    <!-- Resolve theme before first paint to avoid a flash of the wrong colours. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('life.theme') || 'auto'
          var dark = m === 'dark' || (m !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#000000' : '#f2f2f7')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
